name: qsar-ml
channels:
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python=3.10

  # Core scientific
  - numpy=1.26.4
  - pandas=2.2.1
  - scipy=1.13.0

  # RDKit (best installed via conda-forge)
  - rdkit=2023.9.5

  # Jupyter
  - jupyterlab=4.1.5
  - ipywidgets=8.1.2
  - tqdm=4.66.2

  # Visualization
  - matplotlib=3.8.3
  - seaborn=0.13.2
  - plotly=5.20.0

  # Utilities
  - pyyaml=6.0.1
  - joblib=1.3.2

  # Testing
  - pytest=7.4.4
  - pytest-cov=4.1.0

  # Code quality
  - black=23.12.1
  - flake8=7.0.0
  - isort=5.13.2

  # pip-only packages
  - pip
  - pip:
    - chembl-webresource-client>=0.10.9
    - scikit-learn>=1.4.0
    - xgboost>=2.0.3
    - lightgbm>=4.3.0
    - catboost>=1.2.5
    - torch>=2.2.0
    - pytorch-tabnet>=4.1.0
    - optuna>=3.5.0
    - optuna-integration>=3.6.0
    - shap>=0.44.0
    - loguru>=0.7.0
